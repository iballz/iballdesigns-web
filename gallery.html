<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iBall Designs | My Gallery</title>
    <!-- Modern Google Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">

    <!-- Navbar -->
    <nav class="navbar">

        <div class="bento-grid">

            <div class="bento-item">

                <img src="https://i.ibb.co/JjFgvhGb/open-letter-thumbnail-remake.webp"

                <img src="https://i.ibb.co/YBrjQgLb/sunraybee-thumbnail-remake.webp" alt="sunraybee thumbnail remake">

            <div class="bento-item">
                <img src="https://i.ibb.co/fGMYRR4R/thumbnail-remake-goofy-gang.webp" alt="thumbnail remake goofy gang"

        <div class="footer-container">
            <div class="footer-left">
                <div class="logo">iBall</div>

            <div class="footer-center">

                <a href="index.html#contact">Contact</a>
            </div>
            <div class="footer-right">

        <img class="modal-content" id="modalImage" alt="Enlarged Image">
